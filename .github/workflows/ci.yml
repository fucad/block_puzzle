# Every PR and push runs the same checks as the local definition of done
# (CONTRIBUTING.md). The quest validator is the critical gate: merging
# content to main ships it to players immediately.
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Pinned to the version the goldens were generated with.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.1'
          cache: true

      - run: flutter pub get

      - name: Format
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      # Goldens are excluded here: they were generated on macOS and Linux
      # renders them >1% different (verified on run #2), and adopting
      # Linux-rendered goldens needs authenticated artifact access we
      # don't have set up. They still run in every local `flutter test`.
      # Follow-up idea: a golden-update workflow that commits
      # Linux-rendered goldens, making CI the source of truth.
      - name: Test
        run: flutter test --exclude-tags golden

      - name: Validate quest content
        run: dart run tool/validate_quests.dart

      # Catches Gradle/manifest breakage (a real bug class here already).
      - name: Android debug build
        run: flutter build apk --debug
